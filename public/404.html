<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>內控自評作業系統</title>
  <script>
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
